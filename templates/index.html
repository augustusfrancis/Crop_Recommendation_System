<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>
            Crop Recommendation ML
        </title>
        <link href="https://fonts.googleapis.com/css?family=Pacifico" rel="stylesheet" type="text/css">
        <link href="https://fonts.googleapis.com/css?family=Arimo" rel="stylesheet" type="text/css">
        <link href="https://fonts.googleapis.com/css?family=Hind:300" rel="stylesheet" type="text/css">
        <link href="https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300" rel="stylesheet" type="text/css">
        <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    </head>
    <body>
        <div class="login">
            <h1>
                Crop Recommendation ML Model
            </h1>
            <form action="{{url_for('predict')}}" method="post">
                <input type="text" name="Nitrogen" placeholder="Nitrogen level" required="required"/>
                <input type="text" name="Phosphorus" placeholder="Phosphorus level" required="required"/>
                <input type="text" name="Potassium" placeholder="Potassium level" required="required"/>
                <input type="text" name="temperature" placeholder="Temperature level" required="required"/>
                <input type="text" name="humidity" placeholder="Humidity level" required="required"/>
                <input type="text" name="ph" placeholder="pH level" required="required"/>
                <input type="text" name="rainfall" placeholder="Rainfall level" required="required"/>

                <button type="submit" class="btn btn-primary btn-block btn-large">
                    Predict
                </button>
            </form>
            <br>
            <br>
            <h1 id="predi">
                {{ prediction_text }}
            </h1>
        </div>
    </body>
</html>
